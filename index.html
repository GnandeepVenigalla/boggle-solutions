<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Boggle Solver</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f1a; --surface:#161929; --card:#1e2236; --border:#2a3050;
    --accent1:#7c3aed; --accent2:#06b6d4; --accent3:#f59e0b;
    --green:#10b981; --text:#e2e8f0; --muted:#64748b; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 20%,rgba(124,58,237,.18) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(6,182,212,.12) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 20px;}
  header{text-align:center;margin-bottom:32px;}
  header .logo{font-size:2.8rem;margin-bottom:6px;filter:drop-shadow(0 0 20px rgba(124,58,237,.6));}
  header h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:900;background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  header p{color:var(--muted);font-size:1rem;margin-top:8px;}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
  @media(max-width:768px){.layout{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;backdrop-filter:blur(10px);}
  .card-title{font-size:.85rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:8px;}

  /* size buttons */
  .grid-size-row{display:flex;gap:10px;align-items:center;margin-bottom:18px;}
  .grid-size-row label{color:var(--muted);font-size:.85rem;}
  .size-btn{padding:6px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-family:inherit;font-size:.9rem;cursor:pointer;transition:all .2s;}
  .size-btn.active{background:var(--accent1);border-color:var(--accent1);}

  /* quick-type */
  .section-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
  #quick-input{width:100%;background:var(--surface);border:2px solid var(--accent2);border-radius:12px;padding:12px 16px;font-family:inherit;font-size:1rem;font-weight:700;color:var(--text);letter-spacing:.1em;text-transform:uppercase;outline:none;transition:box-shadow .2s;margin-bottom:16px;}
  #quick-input:focus{box-shadow:0 0 0 3px rgba(6,182,212,.25);}
  #quick-input::placeholder{color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none;}

  /* grid */
  #letter-grid{display:grid;gap:9px;margin-bottom:6px;}
  .letter-cell{background:var(--surface);border:2px solid var(--border);border-radius:11px;text-align:center;font-size:1.4rem;font-weight:800;color:var(--text);padding:10px 4px;text-transform:uppercase;width:100%;font-family:inherit;transition:border-color .15s,background .15s;outline:none;}
  .letter-cell.filled{border-color:var(--accent1);background:rgba(124,58,237,.12);}
  .letter-cell:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(6,182,212,.2);}
  /* QU tile — amber while waiting for U */
  .letter-cell.qu-waiting{border-color:var(--accent3)!important;background:rgba(245,158,11,.18)!important;color:var(--accent3)!important;font-size:1.05rem!important;letter-spacing:.05em;}
  .grid-5 .letter-cell{font-size:1.15rem;padding:8px 2px;border-radius:9px;}
  .grid-6 .letter-cell{font-size:.95rem;padding:6px 2px;border-radius:8px;}
  #letter-grid.grid-5{gap:7px;}
  #letter-grid.grid-6{gap:5px;}
  #grid-status{text-align:center;font-size:.78rem;color:var(--muted);height:18px;margin-top:6px;}

  /* solve button */
  #solve-btn{width:100%;padding:15px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,var(--accent1),#9333ea);color:white;font-family:inherit;font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.05em;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 24px rgba(124,58,237,.35);}
  #solve-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,.5);}
  #solve-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .spinner{width:18px;height:18px;border:3px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* image section */
  .img-toggle{text-align:center;margin-top:18px;font-size:.88rem;color:var(--muted);cursor:pointer;}
  .img-toggle span{color:var(--accent2);text-decoration:underline;}
  #image-section{display:none;margin-top:14px;}
  #drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:36px 20px;text-align:center;cursor:pointer;transition:all .25s;}
  #drop-zone:hover,#drop-zone.drag-over{border-color:var(--accent1);background:rgba(124,58,237,.07);}
  #drop-zone .dz-icon{font-size:2.4rem;margin-bottom:12px;display:block;}
  #drop-zone p{color:var(--muted);}
  #drop-zone strong{color:var(--text);}
  #file-input{display:none;}
  #preview-wrap{display:none;margin-top:14px;}
  #preview-img{width:100%;border-radius:12px;border:1px solid var(--border);object-fit:contain;max-height:260px;}
  #img-size-hint{display:none;margin-top:12px;}
  .hint-label{font-size:.78rem;color:var(--muted);margin-bottom:8px;}
  .hint-btns{display:flex;gap:8px;}
  .btn-clear{margin-top:10px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.82rem;transition:all .2s;}
  .btn-clear:hover{border-color:#ef4444;color:#ef4444;}

  /* results */
  #result-panel{min-height:300px;}
  #stats-bar{display:none;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
  .stat-val{font-size:1.9rem;font-weight:800;}
  .stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
  .stat-val.purple{color:var(--accent1);} .stat-val.cyan{color:var(--accent2);} .stat-val.amber{color:var(--accent3);}

  /* extracted grid */
  #extracted-grid{display:none;margin-bottom:18px;}
  .ext-title{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;}
  #ext-cells{display:inline-grid;gap:7px;width:100%;margin-bottom:10px;}
  .ext-cell{background:linear-gradient(135deg,var(--accent1),#9333ea);color:white;font-weight:800;font-size:1.2rem;text-align:center;border-radius:9px;padding:9px 4px;min-width:0;text-transform:uppercase;border:2px solid transparent;font-family:inherit;outline:none;transition:background .2s;width:100%;}
  .ext-cell:focus{background:linear-gradient(135deg,#0ea5e9,#06b6d4);box-shadow:0 0 0 3px rgba(6,182,212,.4);}
  .ext-cell.corrected{background:linear-gradient(135deg,#059669,#10b981);}
  #re-solve-btn{display:none;width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#059669,#10b981);color:white;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;margin-bottom:10px;transition:all .2s;}

  /* search */
  #search-wrap{display:none;margin-bottom:18px;}
  #word-search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px;font-family:inherit;font-size:.92rem;color:var(--text);outline:none;transition:border-color .2s;}
  #word-search:focus{border-color:var(--accent2);}
  #word-search::placeholder{color:var(--muted);}

  /* word list */
  #word-list{display:none;}
  .length-group{margin-bottom:22px;}
  .group-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .group-label{font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
  .group-count{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:.72rem;color:var(--muted);}
  .group-score{margin-left:auto;font-size:.72rem;color:var(--accent3);font-weight:600;}
  .words-wrap{display:flex;flex-wrap:wrap;gap:7px;}
  .word-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:.88rem;font-weight:600;letter-spacing:.05em;transition:all .15s;cursor:default;}
  .word-chip:hover{border-color:var(--accent2);color:var(--accent2);transform:translateY(-1px);}
  .word-chip .pts{font-size:.62rem;color:var(--accent3);font-weight:700;display:block;text-align:center;margin-top:2px;}
  .chip-3{border-left:3px solid #64748b;} .chip-4{border-left:3px solid #06b6d4;}
  .chip-5{border-left:3px solid #10b981;} .chip-6{border-left:3px solid #f59e0b;}
  .chip-7{border-left:3px solid #f97316;} .chip-8p{border-left:3px solid #ef4444;}

  /* ── path visualizer ── */
  #path-panel{display:none; width:100%; flex-basis:100%; margin:10px 0; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px;}
  .path-word{font-size:1rem;font-weight:800;letter-spacing:.06em;color:var(--accent2);margin-bottom:10px;text-align:center;cursor:pointer;}
  #path-board-wrap{position:relative;display:block;width:100%;}
  #path-board{display:grid;gap:5px;position:relative;z-index:1;}
  .pb-cell{border-radius:7px;border:2px solid var(--border);background:var(--card);text-align:center;font-weight:800;font-size:.85rem;color:var(--muted);padding:7px 2px;position:relative;text-transform:uppercase;}
  .pb-cell.on-path{border-color:var(--accent2);background:rgba(6,182,212,.18);color:var(--text);}
  .pb-cell.path-start{border-color:var(--green);background:rgba(16,185,129,.25);color:var(--green);}
  .pb-cell .step-num{position:absolute;top:2px;right:3px;font-size:.5rem;font-weight:700;color:var(--accent3);}
  #path-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:2;}
  .word-chip{cursor:pointer;}
  .word-chip.selected{border-color:var(--accent2)!important;background:rgba(6,182,212,.12)!important;color:var(--accent2)!important;}

  /* empty state */
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .big{font-size:3.5rem;margin-bottom:14px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🎲</div>
    <h1>Boggle Solver</h1>
    <p>Type the letters ⚡ get every word instantly</p>
  </header>

  <div class="layout">
    <!-- LEFT -->
    <div>
      <div class="card">
        <div class="card-title">⌨️ Enter Letters</div>

        <div class="grid-size-row">
          <label>Board size:</label>
          <button class="size-btn active" id="sz4" onclick="setSize(4,this)">4×4</button>
          <button class="size-btn"        id="sz5" onclick="setSize(5,this)">5×5</button>
          <button class="size-btn"        id="sz6" onclick="setSize(6,this)">6×6</button>
        </div>

        <div class="section-label">⚡ Quick type — type all letters in order:</div>
        <div style="position:relative; width:100%; margin-bottom:16px;">
          <input type="text" id="quick-input"
            placeholder="e.g. EAWQFLRTIGMIIFUOGNZTINEEU"
            autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            oninput="quickFill(this.value)"
            style="margin-bottom:0; padding-right:45px;">
          <button onclick="clearBoard()" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.1); border:none; color:var(--text); width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:12px; transition:all 0.2s;" title="Clear Board">✖</button>
        </div>

        <div id="letter-grid"></div>
        <div id="grid-status"></div>

        <button id="solve-btn" onclick="doSolve()">
          <span id="btn-label">🔍 Find All Words</span>
        </button>

      </div>
    </div>

    <!-- RIGHT -->
    <div>
      <div class="card" id="result-panel">
        <div class="card-title">✨ Answers</div>

        <div id="stats-bar">
          <div class="stat-card"><div class="stat-val purple" id="sw">—</div><div class="stat-label">Words</div></div>
          <div class="stat-card"><div class="stat-val cyan"   id="ss">—</div><div class="stat-label">Max Score</div></div>
          <div class="stat-card"><div class="stat-val amber"  id="st">—</div><div class="stat-label">Solved in</div></div>
        </div>

        <div id="extracted-grid">
          <div class="ext-title">📋 Letters from image — <span style="color:var(--accent2)">click to fix</span></div>
          <div id="ext-cells"></div>
          <button id="re-solve-btn" onclick="resolveEdited()">🔄 Re-solve with corrections</button>
        </div>

        <!-- Path visualizer -->
        <div id="path-panel">
          <div class="path-word" id="path-word-label"></div>
          <div id="path-board-wrap">
            <div id="path-board"></div>
            <canvas id="path-canvas"></canvas>
          </div>
          <div id="word-definition" style="display:none; margin-top:12px; font-size:0.85rem; line-height:1.4; color:var(--text); background:var(--card); padding:10px; border-radius:8px; border:1px solid var(--border);"></div>
          <button onclick="banCurrentWord()" style="margin-top:14px; width:100%; padding:10px; background:transparent; border:1px solid rgba(239, 68, 68, 0.5); border-radius:8px; color:#ef4444; font-weight:700; cursor:pointer; transition:all 0.2s;">🚫 Not a word? Ban it forever</button>
        </div>

        <div id="search-wrap">
          <input type="text" id="word-search" placeholder="🔎 Filter words…" oninput="filterWords()">
        </div>

        <div id="word-list"></div>

        <div class="empty-state" id="empty-state">
          <div class="big">🎯</div>
          <p>Type the board letters on the left<br>— answers appear automatically</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let currentGridSize=4, allGroups=[];

// init
buildGrid(4);
document.getElementById('quick-input').focus();

function setSize(n,btn){
  currentGridSize=n;
  document.querySelectorAll('.grid-size-row .size-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildGrid(n);
  document.getElementById('quick-input').value='';
  document.getElementById('quick-input').focus();
}

function clearBoard() {
  document.getElementById('quick-input').value='';
  buildGrid(currentGridSize);
  document.getElementById('quick-input').focus();
}

function buildGrid(n){
  const g=document.getElementById('letter-grid');
  g.style.gridTemplateColumns=`repeat(${n},1fr)`;
  g.className=`grid-${n}`;
  g.innerHTML='';
  for(let r=0;r<n;r++) for(let c=0;c<n;c++){
    const inp=document.createElement('input');
    inp.className='letter-cell'; inp.maxLength=2; inp.id=`c${r}_${c}`;
    inp.placeholder='-'; inp.autocomplete='off'; inp.dataset.waitQU='0';
    inp.addEventListener('input',e=>{
      let v=e.target.value.replace(/[^a-zA-Z]/g,'').toUpperCase();

      // Already waiting for U (had Q), now a second char came in
      if(inp.dataset.waitQU==='1' && v.length>=2){
        if(v[1]==='U'){ e.target.value='QU'; }
        else           { e.target.value='Q';  }  // ignore non-U, keep Q
        inp.dataset.waitQU='0';
        inp.classList.add('filled'); inp.classList.remove('qu-waiting');
        syncQuick(); advance(r,c,n); checkAuto(); updateStatus(); return;
      }

      // Fresh single character
      v=v.slice(0,1);
      e.target.value=v;
      if(!v){
        inp.classList.remove('filled','qu-waiting'); inp.dataset.waitQU='0';
        syncQuick(); updateStatus(); return;
      }
      if(v==='Q'){
        // Wait for possible U
        inp.classList.add('filled','qu-waiting'); inp.dataset.waitQU='1';
        syncQuick(); updateStatus(); return;
      }
      // Normal letter
      inp.classList.add('filled'); inp.classList.remove('qu-waiting'); inp.dataset.waitQU='0';
      syncQuick(); advance(r,c,n); checkAuto(); updateStatus();
    });
    inp.addEventListener('keydown',e=>{
      if(e.key==='Backspace'&&!inp.value){ goBack(r,c,n); }
      // If waiting for QU and user presses non-letter key, finalise Q and advance
      if(inp.dataset.waitQU==='1' && e.key==='Tab'){
        inp.dataset.waitQU='0'; inp.classList.remove('qu-waiting');
        syncQuick(); advance(r,c,n); checkAuto(); updateStatus();
      }
    });
    g.appendChild(inp);
  }
  updateStatus();
}

function advance(r,c,n){
  const nc=c+1<n?c+1:0, nr=c+1<n?r:r+1;
  if(nr<n) document.getElementById(`c${nr}_${nc}`)?.focus();
}
function goBack(r,c,n){
  const pc=c>0?c-1:n-1, pr=c>0?r:r-1;
  if(pr>=0){ const p=document.getElementById(`c${pr}_${pc}`); if(p){p.value='';p.classList.remove('filled');p.focus();syncQuick();updateStatus();} }
}

function quickFill(raw){
  // Parse: treat QU as one tile
  const src=raw.replace(/[^a-zA-Z]/g,'').toUpperCase();
  const tiles=[];
  for(let i=0;i<src.length;i++){
    if(src[i]==='Q' && src[i+1]==='U'){ tiles.push('QU'); i++; }
    else tiles.push(src[i]);
  }
  const n=currentGridSize; let idx=0;
  for(let r=0;r<n;r++) for(let c=0;c<n;c++){
    const inp=document.getElementById(`c${r}_${c}`);
    if(inp){
      const t=tiles[idx++]||'';
      inp.value=t; inp.dataset.waitQU='0';
      inp.classList.toggle('filled',!!t); inp.classList.remove('qu-waiting');
    }
  }
  updateStatus(); checkAuto();
}

function syncQuick(){
  const n=currentGridSize; let s='';
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) s+=document.getElementById(`c${r}_${c}`)?.value||'';
  document.getElementById('quick-input').value=s;
}

function updateStatus(){
  const n=currentGridSize; let filled=0;
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(document.getElementById(`c${r}_${c}`)?.value) filled++;
  const el=document.getElementById('grid-status');
  if(!filled){el.textContent='';return;}
  if(filled===n*n){el.textContent='✅ Board complete — solving…';el.style.color='var(--green)';}
  else{el.textContent=`${filled} / ${n*n} letters`;el.style.color='var(--muted)';}
}

function getGrid(){
  const n=currentGridSize,grid=[];
  for(let r=0;r<n;r++){
    const row=[];
    for(let c=0;c<n;c++){
      let v=document.getElementById(`c${r}_${c}`)?.value?.toLowerCase()||'?';
      if(v==='qu') v='q';   // QU tile → solver stores as 'q'
      else v=v[0]||'?';
      row.push(v);
    }
    grid.push(row);
  }
  return grid;
}

function checkAuto(){
  const n=currentGridSize;
  for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(!document.getElementById(`c${r}_${c}`)?.value) return;
  setTimeout(doSolve,150);
}

// solve
async function doSolve(){
  const btn=document.getElementById('solve-btn'),lbl=document.getElementById('btn-label');
  btn.disabled=true; lbl.innerHTML='<div class="spinner"></div> Solving…';
  try{
    let data;
    const grid=getGrid();
    if(grid.flat().includes('?')) throw new Error('Please fill in all letters first');
    const r=await fetch('/solve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({grid})});
    data=await r.json(); if(!r.ok) throw new Error(data.error||'Server error');
    
    render(data);
  } catch(err){ alert('❌ '+err.message); }
  finally{ btn.disabled=false; lbl.textContent='🔍 Find All Words'; document.getElementById('grid-status').textContent=''; }
}

let currentGrid = null;
let selectedChip = null;
let currentPathWord = null;

function render(data){
  currentGrid = data.grid;   // save for path drawing
  allGroups=data.groups;
  document.getElementById('sw').textContent=data.total_words.toLocaleString();
  document.getElementById('ss').textContent=data.total_score;
  document.getElementById('st').textContent=data.elapsed+'s';
  document.getElementById('stats-bar').style.display='grid';

  document.getElementById('path-panel').style.display='none';
  selectedChip=null;
  currentPathWord=null;
  document.getElementById('search-wrap').style.display='block';
  document.getElementById('word-search').value='';
  document.getElementById('empty-state').style.display='none';
  document.getElementById('word-list').style.display='block';
  renderWords(allGroups);
}

// ── Path visualizer ────────────────────────────────────────────
function showPath(word, path, chipEl) {
  if (!currentGrid) return;
  const n = currentGrid.length;
  currentPathWord = word;

  // Toggle: click same word again to close
  if (selectedChip === chipEl) {
    document.getElementById('path-panel').style.display = 'none';
    chipEl.classList.remove('selected');
    selectedChip = null;
    currentPathWord = null;
    return;
  }
  if (selectedChip) selectedChip.classList.remove('selected');
  selectedChip = chipEl;
  chipEl.classList.add('selected');

  document.getElementById('path-word-label').textContent = word + ' — tap to close';

  // Build mini board
  const board = document.getElementById('path-board');
  board.style.gridTemplateColumns = `repeat(${n}, 1fr)`;
  board.innerHTML = '';
  const pathSet = new Set(path.map(([r,c])=>`${r},${c}`));

  for (let r = 0; r < n; r++) {
    for (let c = 0; c < n; c++) {
      const cell = document.createElement('div');
      cell.className = 'pb-cell';
      cell.id = `pb_${r}_${c}`;
      let letter = currentGrid[r][c].toUpperCase();
      if (letter === 'Q') letter = 'QU';
      cell.textContent = letter;

      const pathIdx = path.findIndex(([pr,pc]) => pr===r && pc===c);
      if (pathIdx === 0) {
        cell.classList.add('path-start');
        const s = document.createElement('span'); s.className='step-num'; s.textContent='1'; cell.appendChild(s);
      } else if (pathIdx > 0) {
        cell.classList.add('on-path');
        const s = document.createElement('span'); s.className='step-num'; s.textContent=pathIdx+1; cell.appendChild(s);
      }
      board.appendChild(cell);
    }
  }

  const panel = document.getElementById('path-panel');
  chipEl.parentNode.insertBefore(panel, chipEl.nextSibling);
  panel.style.display = 'block';

  // Fetch Definition
  const defEl = document.getElementById('word-definition');
  defEl.style.display = 'block';
  defEl.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:2px;display:inline-block;"></span> Looking up meaning...';
  
  fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`)
    .then(r => r.json())
    .then(data => {
      if(Array.isArray(data) && data[0].meanings) {
        const type = data[0].meanings[0].partOfSpeech;
        const def = data[0].meanings[0].definitions[0].definition;
        defEl.innerHTML = `<strong style="color:var(--accent2);">${type}.</strong> ${def}`;
      } else {
        defEl.innerHTML = `<span style="color:var(--muted);">No definition found in standard dictionary.</span>`;
      }
    })
    .catch(() => {
      defEl.innerHTML = `<span style="color:var(--muted);">Could not load definition.</span>`;
    });

  // Draw lines on canvas after layout settles
  requestAnimationFrame(() => requestAnimationFrame(() => drawPathLines(path, n)));
}

function drawPathLines(path, n) {
  const wrap = document.getElementById('path-board-wrap');
  const canvas = document.getElementById('path-canvas');
  const W = wrap.offsetWidth, H = wrap.offsetHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  // Get centre of each cell in the path
  const centres = path.map(([r,c]) => {
    const el = document.getElementById(`pb_${r}_${c}`);
    if (!el) return null;
    const rect = el.getBoundingClientRect();
    const wrapRect = wrap.getBoundingClientRect();
    return { x: rect.left - wrapRect.left + rect.width/2, y: rect.top - wrapRect.top + rect.height/2 };
  }).filter(Boolean);

  if (centres.length < 2) return;

  // Animate drawing line segment by segment
  let seg = 0;
  const totalSegs = centres.length - 1;
  const segDuration = Math.min(220, 1000 / totalSegs);
  let start = null;

  function drawSegment(ts) {
    if (!start) start = ts;
    const prog = Math.min((ts - start) / segDuration, 1);
    ctx.clearRect(0,0,W,H);

    // Draw completed segments
    ctx.strokeStyle = 'rgba(6,182,212,0.75)';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.shadowColor = 'rgba(6,182,212,0.5)';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    for (let i = 0; i < seg; i++) {
      ctx.moveTo(centres[i].x, centres[i].y);
      ctx.lineTo(centres[i+1].x, centres[i+1].y);
    }
    // Partially drawn current segment
    if (seg < totalSegs) {
      const a = centres[seg], b = centres[seg+1];
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(a.x + (b.x-a.x)*prog, a.y + (b.y-a.y)*prog);
    }
    ctx.stroke();

    // Draw dots at each completed waypoint
    ctx.shadowBlur = 0;
    for (let i = 0; i <= seg; i++) {
      ctx.beginPath();
      ctx.arc(centres[i].x, centres[i].y, 5, 0, Math.PI*2);
      ctx.fillStyle = i===0 ? 'rgba(16,185,129,0.9)' : 'rgba(6,182,212,0.9)';
      ctx.fill();
    }

    if (prog < 1) { requestAnimationFrame(drawSegment); }
    else {
      seg++; start = null;
      if (seg < totalSegs) requestAnimationFrame(drawSegment);
      else {
        // Final dot
        ctx.beginPath();
        ctx.arc(centres[centres.length-1].x, centres[centres.length-1].y, 5, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(245,158,11,0.9)';
        ctx.fill();
      }
    }
  }
  requestAnimationFrame(drawSegment);
}

function chipCls(l){if(l<=3)return'chip-3';if(l===4)return'chip-4';if(l===5)return'chip-5';if(l===6)return'chip-6';if(l===7)return'chip-7';return'chip-8p';}

function renderWords(groups){
  const c=document.getElementById('word-list'); 
  const panel = document.getElementById('path-panel');
  if (panel && panel.parentNode !== document.body) document.body.appendChild(panel);
  c.innerHTML='';
  const f=document.getElementById('word-search').value.toUpperCase();
  groups.forEach(g=>{
    const ws=f?g.words.filter(w=>w.word.includes(f)):g.words;
    if(!ws.length) return;
    const gs=ws.reduce((s,w)=>s+w.score,0);
    const div=document.createElement('div'); div.className='length-group';
    div.innerHTML=`<div class="group-header"><span class="group-label">${g.length}-letter words</span><span class="group-count">${ws.length}</span><span class="group-score">${gs} pts</span></div><div class="words-wrap" id="wg${g.length}"></div>`;
    c.appendChild(div);
    const wrap=div.querySelector(`#wg${g.length}`);
    ws.forEach(({word,score,path})=>{
      const ch=document.createElement('div');
      ch.className=`word-chip ${chipCls(word.length)}`;
      ch.title='Click to see path on board';
      ch.innerHTML=`${word}<span class="pts">${score}pt</span>`;
      ch.addEventListener('click', () => showPath(word, path, ch));
      wrap.appendChild(ch);
    });
  });
  if(!c.children.length) c.innerHTML=`<p style="color:var(--muted);text-align:center;padding:40px 0">No matching words</p>`;
}

function filterWords(){renderWords(allGroups);}

async function banCurrentWord() {
  if (!currentPathWord) return;
  const word = currentPathWord;
  
  // Sync to server
  fetch('/ban', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({word: word})
  }).catch(err => console.error(err));
  
  // Instantly remove from UI
  let newTotalWords = 0;
  let newTotalScore = 0;
  allGroups.forEach(g => {
    g.words = g.words.filter(w => w.word !== word);
    newTotalWords += g.words.length;
    newTotalScore += g.words.reduce((sum, w) => sum + w.score, 0);
  });
  
  document.getElementById('sw').textContent = newTotalWords.toLocaleString();
  document.getElementById('ss').textContent = newTotalScore;
  
  document.getElementById('path-panel').style.display = 'none';
  if (selectedChip) selectedChip.classList.remove('selected');
  selectedChip = null;
  currentPathWord = null;
  
  renderWords(allGroups);
}
